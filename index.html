<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সালামি হুইল - ১/দোয়া ফিক্সড</title>
    <style>
        body { font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: white; }
        .wheel-container { position: relative; width: 320px; height: 320px; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #ffd700; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ffd700; z-index: 10; }
        .btn { margin-top: 30px; padding: 12px 40px; font-size: 20px; background: #ffd700; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 20px; font-size: 22px; color: #ffd700; text-align: center; }
    </style>
</head>
<body>
    <h2>সালামি ভাগ্য পরীক্ষা! 🌙</h2>
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <button class="btn" id="spinBtn" onclick="spin()">ঘুরিয়ে দেখুন!</button>
    <div id="msg"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        // আইটেমগুলো এবং তাদের রঙ
        const items = ["১০০০", "৫০০", "২০০", "১০০", "৫০", "২০", "১০", "১", "দোয়া"];
        const colors = ["#ff4d4d", "#4d94ff", "#4dff88", "#ffdb4d", "#ff4dff", "#4dffff", "#ff944d", "#ffffff", "#9b59b6"];
        
        const arc = 2 * Math.PI / 9;
        let rotation = 0;

        function draw() {
            items.forEach((label, i) => {
                ctx.fillStyle = colors[i];
                ctx.beginPath(); ctx.moveTo(160, 160);
                ctx.arc(160, 160, 160, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(160, 160); ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#000"; ctx.font = "bold 16px Arial";
                ctx.fillText(label, 150, 5); ctx.restore();
            });
        }
        draw();

        function spin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('msg').innerText = "ঘুরছে...";

            // ফিক্সড লজিক: শুধু ১ (ইন্ডেক্স ৭) অথবা দোয়া (ইন্ডেক্স ৮)
            const options = [7, 8];
            const finalPick = options[Math.floor(Math.random() * options.length)];
            
            // ক্যালকুলেশন যাতে কাটায় ঠিক ঐ দুইটাই পড়ে
            const deg = (360 / 9);
            const stopAt = 360 - (finalPick * deg) - (deg / 2);
            rotation += (3600 + stopAt); // ১০ বার ঘুরে তারপর থামবে

            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                btn.disabled = false;
                const res = items[finalPick];
                document.getElementById('msg').innerText = res === "দোয়া" ? "শুধু দোয়া পেলেন! 😇" : "১ টাকা জিতেছেন! 😂";
            }, 5100);
        }
    </script>
</body>
</html>
